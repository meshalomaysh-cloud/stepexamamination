<!doctype html>
<html lang="ar" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>إختبار الاستماع</title>
    <link rel="stylesheet" href="teststyle.css" />
    <link
      rel="icon"
      type="image/png"
      href="ENGLISH STEP ICON-modified.png"
      alt="The website icon, it is a circular image containing STEP English at the the top, a practice website at the bottom written in Arabic, and a middle orange image."
    />
  </head>
  <body>
    <div class="app">
      <h1>Listening</h1>
      <br />
      <p
        style="
          text-align: right;
          font-family: Arial, Helvetica, sans-serif;
          color: #001e4d;
          font-size: 20px;
        "
      >
        ملاحظة: يوجد محاولتين إستماع لكل صوتية
      </p>
      <div id="start-screen" class="quiz"></div>

      <div class="quiz" id="main-quiz-container" style="display: none"></div>
      <div class="quiz">
        <div class="quiz-header">
          <div class="progress-container">
            <div id="progress-bar"></div>
          </div>

          <div id="audio-container">
            <audio id="quiz-audio" controls controlsList="nodownload">
              <source src="" type="audio/mpeg" />
              Your browser does not support the audio element.
            </audio>
          </div>
        </div>

        <h3 id="question">Loading question...</h3>

        <div id="answer-buttons"></div>

        <button id="next-btn" style="display: none">Next</button>
      </div>
    </div>

    <script src="listening.js"></script>
  </body>
</html>
